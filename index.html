<!DOCTYPE html>

  <head>

      },
      "sameAs": [
        "https://github.com/Rohit-Nehate",
        "https://www.instagram.com/examiner.in"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Rohit Nehte Portfolio",
      "url": "https://rohitnehte.me",
